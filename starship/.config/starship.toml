"$schema" = 'https://starship.rs/config-schema.json'

palette = 'cup-of-coffee'


format = """
[](dark-brown)\
$time\

[](fg:dark-brown bg:cuppa )\
$username\

[](fg:cuppa bg:ironstone )\
$directory\

[](fg:ironstone bg:dark-tan )\
$git_branch\

[](fg:dark-tan bg:bermuda-beige)\
$git_status\

[](fg:bermuda-beige bg:cream)\
$cmd_duration\

[ ](fg:cream)\
$line_break\
$character
"""


[time]
disabled = false
time_format = "%R"
style = "bg:red"
format = '[[$time](bg:dark-brown fg:dark-tan)]($style)'

[username]
show_always = true
style_user = "bg:cuppa fg:bermuda-beige"
style_root = "bg:cuppa fg:cream"
format = '[$user]($style)'

[directory]
style = "bg:ironstone fg:cream"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "bg:dark-tan"
format = '[[$symbol $branch](fg:black2 bg:dark-tan)]($style)'

[git_status]
style = "bg:bermuda-beige"
format = '[[($all_status$ahead_behind)](fg:black1 bg:bermuda-beige)]($style)'

[cmd_duration]
show_milliseconds = true
style = "bg:cream"
format = '[[ in $duration](bg:cream fg:black1)]($style)' # " in $duration"
disabled = false
show_notifications = true
min_time_to_notify = 10000

[line_break]
disabled = true

[character]
disabled = false
success_symbol = '[❯](bold fg:green)'
error_symbol = '[❯](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'



# https://www.schemecolor.com/cup-of-coffee.php 
[palettes.cup-of-coffee]
black1 = "#181A1B"
black2 = "#222426"
dark-brown = "#3C2F2F" 
cuppa = "#6F4436"
ironstone = "#854442" 
dark-tan = "#BE9B7B"
bermuda-beige = "#DFCCAF" 
cream = "#F6F5F3"
green = "#a6e3a1"
yellow = "#f9e2af"
red = "#f38ba8"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
